name: Build And Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir -p dist/freesiem-sentinel
          rsync -av \
            --exclude=".git" \
            --exclude=".github" \
            --exclude="dist" \
            ./ dist/freesiem-sentinel/
          cd dist
          zip -r freesiem-sentinel.zip freesiem-sentinel

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/freesiem-sentinel.zip
          generate_release_notes: false
          append_body: false
